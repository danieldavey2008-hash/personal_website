<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daniel Davey</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
    }

    body {
      background: #fff;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    }

    .name {
      position: fixed;
      top: 40px;
      left: 48px;
      z-index: 10;
      display: inline-block;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 5px;
      color: #fff;
      text-transform: uppercase;

      padding: 21px 28px 21px 28px;
      background: #000;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      grid-template-rows: repeat(3, calc(100vh / 3));
      gap: 0;
      width: 100vw;
      height: 100vh;
    }

    .cell {
      position: relative;
      overflow: hidden;
    }

    .cell img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      filter: grayscale(0);
      transition: filter 0.4s ease;
    }

    .cell:hover img {
      filter: grayscale(1) brightness(0.87);
    }

    .cell::after {
      content: attr(data-name);
      position: absolute;
      bottom: 12px;
      left: 14px;
      color: #fff;
      font-size: 10px;
      letter-spacing: 0.5px;
      text-shadow: 0 1px 4px rgba(0,0,0,0.7);
      opacity: 0;
      transition: opacity 0.4s ease;
      pointer-events: none;
    }

    .cell:hover::after {
      opacity: 1;
    }

    .s { grid-column: span 2; }
    .m { grid-column: span 3; }
    .l { grid-column: span 4; }

    #grain {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 5;
    }
  </style>
</head>
<body>
  <canvas id="grain"></canvas>
  <span class="name">DANIELDAVEY.CO.UK</span>

  <div class="gallery">
    <!-- row 1: L + M + S + M -->
    <div class="cell l"><img alt=""></div><div class="cell m"><img alt=""></div><div class="cell s"><img alt=""></div><div class="cell m"><img alt=""></div>
    <!-- row 2: S + L + M + M -->
    <div class="cell s"><img alt=""></div><div class="cell l"><img alt=""></div><div class="cell m"><img alt=""></div><div class="cell m"><img alt=""></div>
    <!-- row 3: M + S + M + L -->
    <div class="cell m"><img alt=""></div><div class="cell s"><img alt=""></div><div class="cell m"><img alt=""></div><div class="cell l"><img alt=""></div>
  </div>

      'image.jpg',
      'image2.jpg',
      'lanzarote-4.jpg'
    ];

    function shuffle(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    const picked = shuffle([...allImages]).slice(0, 12);
    document.querySelectorAll('.gallery .cell').forEach((cell, i) => {
      cell.querySelector('img').src = 'Personal_Images/' + picked[i];
      cell.dataset.name = picked[i].replace(/\.[^.]+$/, '').replace(/\s*\(\d+\)$/, '');
    });

    const canvas = document.getElementById('grain');
    const ctx = canvas.getContext('2d');

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }

    let last = 0;
    function draw(t) {
      requestAnimationFrame(draw);
      if (t - last < 50) return;
      last = t;

      const w = canvas.width, h = canvas.height;
      const img = ctx.createImageData(w, h);
      const buf = new Uint32Array(img.data.buffer);
      for (let i = 0; i < buf.length; i++) {
        const v = Math.random() * 255 | 0;
        buf[i] = (30 << 24) | (v << 16) | (v << 8) | v;
      }
      ctx.putImageData(img, 0, 0);
    }

    window.addEventListener('resize', resize);
    resize();
    requestAnimationFrame(draw);
  </script>
</body>
</html>
