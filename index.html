<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daniel Davey</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
    }

    body {
      background: #fff;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    }

    .name {
      position: fixed;
      top: 40px;
      left: 48px;
      z-index: 10;
      display: inline-block;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 5px;
      color: #fff;
      text-transform: uppercase;

      padding: 21px 28px 21px 28px;
      background: #000;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      grid-template-rows: repeat(3, calc(100vh / 3));
      gap: 0;
      width: 100vw;
      height: 100vh;
    }

    .cell {
      position: relative;
      overflow: hidden;
    }

    .cell img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      filter: grayscale(0);
      transition: filter 0.4s ease;
    }

    .cell:hover img {
      filter: grayscale(1) brightness(0.87);
    }

    .cell::after {
      content: attr(data-name);
      position: absolute;
      bottom: 12px;
      left: 14px;
      color: #fff;
      font-size: 10px;
      letter-spacing: 0.5px;
      text-shadow: 0 1px 4px rgba(0,0,0,0.7);
      opacity: 0;
      transition: opacity 0.4s ease;
      pointer-events: none;
    }

    .cell:hover::after {
      opacity: 1;
    }

    .s { grid-column: span 2; }
    .m { grid-column: span 3; }
    .l { grid-column: span 4; }

    #grain {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 5;
    }
  </style>
</head>
<body>
  <canvas id="grain"></canvas>
  <span class="name">DANIELDAVEY.CO.UK</span>

  <div class="gallery">
    <!-- row 1: L + M + S + M -->
    <div class="cell l"><img alt=""></div><div class="cell m"><img alt=""></div><div class="cell s"><img alt=""></div><div class="cell m"><img alt=""></div>
    <!-- row 2: S + L + M + M -->
    <div class="cell s"><img alt=""></div><div class="cell l"><img alt=""></div><div class="cell m"><img alt=""></div><div class="cell m"><img alt=""></div>
    <!-- row 3: M + S + M + L -->
    <div class="cell m"><img alt=""></div><div class="cell s"><img alt=""></div><div class="cell m"><img alt=""></div><div class="cell l"><img alt=""></div>
  </div>

  <script>
    const allImages = [
      'Akihabara Electric Town in Tokyo.jpg',
      'Asago, Japan.jpg',
      'Atomium in Brussels, Belgium.png',
      'Basingstoke, England.jpg',
      'Bath, England (2).jpg',
      'Bath, England.jpg',
      'Brussels, Belgium.jpg',
      'Cathedral of St. Michael and St. Gudula in Brussels, Belgium.png',
      'Eiffel Tower View, Paris, France.png',
      'Fujiyoshida, Japan (2).jpg',
      'Fujiyoshida, Japan .jpg',
      'Fujiyoshida, Japan.jpg',
      'Fushimi Inari-taisha in Kyoto, Japan.jpg',
      'Grand Central Terminal in New York City, USA.jpg',
      'Haeundae Blueline Park in Busan, South Korea.jpg',
      'Himeji Castle, Himeji, Japan.jpg',
      'Igidae Park Coastal Trail in Busan, South Korea.jpg',
      'Imjingak Pyeonghwa Nuri Park near the Korean Demilitarized Zone (DMZ).jpg',
      'Kyoto, Japan.jpg',
      'Lanzarote, Island in Spain (2).jpg',
      'Lanzarote, Island in Spain.jpg',
      'London, England.jpg',
      'New Forest, England (2).jpg',
      'New Forest, England.jpg',
      'New Jersey, USA.jpg',
      'New York City, USA (2).jpg',
      'New York City, USA (3).jpg',
      'New York City, USA (4).jpg',
      'New York City, USA (5).jpg',
      'New York City, USA (6).jpg',
      'New York City, USA.jpg',
      'Osaka, Japan.jpg',
      'Otemae Street in Himeji, Japan.jpg',
      'Roosevelt Island in New York City, USA (2).jpg',
      'Roosevelt Island in New York City, USA.jpg',
      'Seoul World Cup Stadium in South Korea.jpg',
      'Takeda Castle Ruins, Japan.jpg',
      'teamLab Planets in Tokyo, Japan.jpg',
      'Tiranë, Albania (2).jpg',
      'Tiranë, Albania (3).jpg',
      'Tiranë, Albania (4).jpg',
      'Tiranë, Albania.jpg',
      'Tokyo Skytree, Japan.jpg',
      "Tokyo's Akihabara district, Japan.jpg",
      'Tokyo, Japan.jpg',
      'ushimi Inari Taisha in Kyoto, Japan.jpg',
      'Vlorë , Albania.jpg',
      'Vlorë Albania (2).jpg',
      'Vlorë, Albania (2).jpg',
      'Vlorë, Albania.jpg',
      'Yamanashi , Japan.jpg'
    ];

    function shuffle(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    const picked = shuffle([...allImages]).slice(0, 12);
    document.querySelectorAll('.gallery .cell').forEach((cell, i) => {
      cell.querySelector('img').src = 'Personal_Images/' + picked[i];
      cell.dataset.name = picked[i].replace(/\.[^.]+$/, '').replace(/\s*\(\d+\)$/, '').replace(/ in /g, ', ').trim();
    });

    const canvas = document.getElementById('grain');
    const ctx = canvas.getContext('2d');

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }

    let last = 0;
    function draw(t) {
      requestAnimationFrame(draw);
      if (t - last < 50) return;
      last = t;

      const w = canvas.width, h = canvas.height;
      const img = ctx.createImageData(w, h);
      const buf = new Uint32Array(img.data.buffer);
      for (let i = 0; i < buf.length; i++) {
        const v = Math.random() * 255 | 0;
        buf[i] = (30 << 24) | (v << 16) | (v << 8) | v;
      }
      ctx.putImageData(img, 0, 0);
    }

    window.addEventListener('resize', resize);
    resize();
    requestAnimationFrame(draw);
  </script>
</body>
</html>
