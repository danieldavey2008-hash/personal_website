<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daniel Davey</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
    }

    body {
      background: #fff;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    }

    .name {
      position: fixed;
      top: 40px;
      left: 48px;
      z-index: 10;
      display: inline-block;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 5px;
      color: #fff;
      text-transform: uppercase;

      padding: 21px 28px 21px 28px;
      background: #000;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-template-rows: repeat(3, calc(100vh / 3));
      gap: 0;
      width: 100vw;
      height: 100vh;
    }

    .gallery img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

  </style>
</head>
