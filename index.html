<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daniel Davey</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
    }

    body {
      background: #fff;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    }

    .name {
      position: fixed;
      top: 40px;
      left: 48px;
      z-index: 10;
      display: inline-block;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 5px;
      color: #fff;
      text-transform: uppercase;

      padding: 21px 28px 21px 28px;
      background: #000;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      grid-template-rows: repeat(3, calc(100vh / 3));
      gap: 0;
      width: 100vw;
      height: 100vh;
    }

    .gallery img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      filter: grayscale(0);
      transition: filter 0.4s ease;
    }

    .gallery img:hover {
      filter: grayscale(1);
    }

    .s { grid-column: span 2; }
    .m { grid-column: span 3; }
    .l { grid-column: span 4; }

    #grain {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 5;
    }
  </style>
</head>
<body>
  <canvas id="grain"></canvas>
  <span class="name">DANIELDAVEY.CO.UK</span>

  <div class="gallery">
    <!-- row 1: L(4) + M(3) + S(2) + M(3) = 12 -->
    <img class="l" src="Personal_Images/23fe28a9-1ac2-4167-9145-c1f929b9d991-1_all_880.jpg" alt="">
    <img class="m" src="Personal_Images/lanzarote-4.jpg" alt="">
    <img class="s" src="Personal_Images/23fe28a9-1ac2-4167-9145-c1f929b9d991-1_all_55.jpg" alt="">
    <img class="m" src="Personal_Images/23fe28a9-1ac2-4167-9145-c1f929b9d991-1_all_884.jpg" alt="">

    <!-- row 2: S(2) + L(4) + M(3) + M(3) = 12 -->
    <img class="s" src="Personal_Images/23fe28a9-1ac2-4167-9145-c1f929b9d991-1_all_112.jpg" alt="">
    <img class="l" src="Personal_Images/23fe28a9-1ac2-4167-9145-c1f929b9d991-1_all_680.jpg" alt="">
    <img class="m" src="Personal_Images/23fe28a9-1ac2-4167-9145-c1f929b9d991-1_all_61.jpg" alt="">
    <img class="m" src="Personal_Images/23fe28a9-1ac2-4167-9145-c1f929b9d991-1_all_908.jpg" alt="">

    <!-- row 3: M(3) + S(2) + M(3) + L(4) = 12 -->
    <img class="m" src="Personal_Images/23fe28a9-1ac2-4167-9145-c1f929b9d991-1_all_838.jpg" alt="">
    <img class="s" src="Personal_Images/23fe28a9-1ac2-4167-9145-c1f929b9d991-1_all_471.jpg" alt="">
    <img class="m" src="Personal_Images/23fe28a9-1ac2-4167-9145-c1f929b9d991-1_all_1549.jpg" alt="">
    <img class="l" src="Personal_Images/23fe28a9-1ac2-4167-9145-c1f929b9d991-1_all_96.jpg" alt="">
  </div>

  <script>
    const canvas = document.getElementById('grain');
    const ctx = canvas.getContext('2d');

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }

    let last = 0;
    function draw(t) {
      requestAnimationFrame(draw);
      if (t - last < 50) return;
      last = t;

      const w = canvas.width, h = canvas.height;
      const img = ctx.createImageData(w, h);
      const buf = new Uint32Array(img.data.buffer);
      for (let i = 0; i < buf.length; i++) {
        const v = Math.random() * 255 | 0;
        buf[i] = (30 << 24) | (v << 16) | (v << 8) | v;
      }
      ctx.putImageData(img, 0, 0);
    }

    window.addEventListener('resize', resize);
    resize();
    requestAnimationFrame(draw);
  </script>
</body>
</html>
