<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daniel Davey</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #fff;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      padding: 40px 48px;
    }

    .name {
      display: inline-block;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 5px;
      color: #111;
      text-transform: uppercase;
      border-bottom: 1px solid #111;
      padding-bottom: 12px;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-template-rows: 320px 260px 300px;
      gap: 3px;
      margin-top: 32px;
    }

    .gallery img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .wide { grid-column: span 2; }
  </style>
</head>
<body>
  <span class="name">DANIELDAVEY.CO.UK</span>

  <div class="gallery">

    <img src="Personal_Images/23fe28a9-1ac2-4167-9145-c1f929b9d991-1_all_61.jpg" alt="">

    <img src="Personal_Images/23fe28a9-1ac2-4167-9145-c1f929b9d991-1_all_838.jpg" alt="">
    <img src="Personal_Images/23fe28a9-1ac2-4167-9145-c1f929b9d991-1_all_471.jpg" alt="">
    <img class="wide" src="Personal_Images/23fe28a9-1ac2-4167-9145-c1f929b9d991-1_all_1549.jpg" alt="">
  </div>
</body>
</html>
