<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daniel Davey</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
    }

    body {
      background: #fff;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    }

    .name {
      position: fixed;
      top: 40px;
      left: 48px;
      z-index: 10;
      display: inline-block;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 5px;
      color: #fff;
      text-transform: uppercase;

      padding: 21px 28px 21px 28px;
      background: #000;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      grid-template-rows: repeat(3, calc(100vh / 3));
      gap: 0;
      width: 100vw;
      height: 100vh;
    }

    .cell {
      position: relative;
      perspective: var(--perspective);
      cursor: pointer;
      clip-path: inset(0);
    }

    .cell.is-spinning {
      z-index: 2;
    }

    .flipper {
      width: 100%;
      height: 100%;
      transform-style: preserve-3d;
      transition: transform 2.2s cubic-bezier(0.33, 1, 0.68, 1);
    }

    .flipper.flipped {
      transform: rotateX(-180deg);
    }

    .face {
      position: absolute;
      inset: 0;
      backface-visibility: hidden;
      overflow: hidden;
      clip-path: inset(0);
    }

    .face.front  { transform: translateZ(var(--hh)); }
    .face.back   { transform: rotateX(180deg) translateZ(var(--hh)); }
    /* edge faces: scaleY to match box depth; full width matches un-scaled faces */
    .face.top    { transform: rotateX(-90deg) translateZ(var(--hh-edge)) scaleY(var(--depth-scale)); background: #0a0a0a; }
    .face.bottom { transform: rotateX( 90deg) translateZ(var(--hh-edge)) scaleY(var(--depth-scale)); background: #0a0a0a; }

    .face img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      filter: grayscale(0);
      transition: filter 0.4s ease;
    }

    .cell:hover .face img {
      filter: grayscale(1) brightness(0.67);
    }

    .cell::after {
      content: attr(data-name);
      position: absolute;
      bottom: 12px;
      left: 14px;
      z-index: 1;
      color: #fff;
      font-size: 10px;
      letter-spacing: 0.5px;
      text-shadow: 0 1px 4px rgba(0,0,0,0.7);
      opacity: 0;
      transition: opacity 0.4s ease;
      pointer-events: none;
    }

    .cell:hover::after {
      opacity: 1;
    }

    .s { grid-column: span 2; }
    .m { grid-column: span 3; }
    .l { grid-column: span 4; }

    @media (max-width: 768px) {
      .gallery {
        grid-template-columns: repeat(2, 1fr);
        grid-template-rows: none;
        grid-auto-rows: 50vw;
        height: auto;
      }

      .s, .m, .l { grid-column: span 1; }
    }

    #grain {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 5;
    }
  </style>
</head>
<body>
  <canvas id="grain"></canvas>
  <span class="name">DANIELDAVEY.CO.UK</span>

  <div class="gallery">
    <!-- row 1: L + M + S + M -->
    <div class="cell l"><div class="flipper"><div class="face front"><img alt=""></div><div class="face back"><img alt=""></div><div class="face top"></div><div class="face bottom"></div></div></div><div class="cell m"><div class="flipper"><div class="face front"><img alt=""></div><div class="face back"><img alt=""></div><div class="face top"></div><div class="face bottom"></div></div></div><div class="cell s"><div class="flipper"><div class="face front"><img alt=""></div><div class="face back"><img alt=""></div><div class="face top"></div><div class="face bottom"></div></div></div><div class="cell m"><div class="flipper"><div class="face front"><img alt=""></div><div class="face back"><img alt=""></div><div class="face top"></div><div class="face bottom"></div></div></div>
    <!-- row 2: S + L + M + M -->
    <div class="cell s"><div class="flipper"><div class="face front"><img alt=""></div><div class="face back"><img alt=""></div><div class="face top"></div><div class="face bottom"></div></div></div><div class="cell l"><div class="flipper"><div class="face front"><img alt=""></div><div class="face back"><img alt=""></div><div class="face top"></div><div class="face bottom"></div></div></div><div class="cell m"><div class="flipper"><div class="face front"><img alt=""></div><div class="face back"><img alt=""></div><div class="face top"></div><div class="face bottom"></div></div></div><div class="cell m"><div class="flipper"><div class="face front"><img alt=""></div><div class="face back"><img alt=""></div><div class="face top"></div><div class="face bottom"></div></div></div>
    <!-- row 3: M + S + M + L -->
    <div class="cell m"><div class="flipper"><div class="face front"><img alt=""></div><div class="face back"><img alt=""></div><div class="face top"></div><div class="face bottom"></div></div></div><div class="cell s"><div class="flipper"><div class="face front"><img alt=""></div><div class="face back"><img alt=""></div><div class="face top"></div><div class="face bottom"></div></div></div><div class="cell m"><div class="flipper"><div class="face front"><img alt=""></div><div class="face back"><img alt=""></div><div class="face top"></div><div class="face bottom"></div></div></div><div class="cell l"><div class="flipper"><div class="face front"><img alt=""></div><div class="face back"><img alt=""></div><div class="face top"></div><div class="face bottom"></div></div></div>
  </div>

  <script>
    const allImages = [
      'Akihabara Electric Town in Tokyo.jpg',
      'Asago, Japan.jpg',
      'Atomium in Brussels, Belgium.png',
      'Basingstoke, England.jpg',
      'Bath, England (2).jpg',
      'Bath, England.jpg',
      'Brussels, Belgium.jpg',
      'Cathedral of St. Michael and St. Gudula in Brussels, Belgium.png',
      'Eiffel Tower View, Paris, France.png',
      'Fujiyoshida, Japan (2).jpg',
      'Fujiyoshida, Japan .jpg',
      'Fujiyoshida, Japan.jpg',
      'Fushimi Inari-taisha in Kyoto, Japan.jpg',
      'Grand Central Terminal in New York City, USA.jpg',
      'Haeundae Blueline Park in Busan, South Korea.jpg',
      'Himeji Castle, Himeji, Japan.jpg',
      'Igidae Park Coastal Trail in Busan, South Korea.jpg',
      'Imjingak Pyeonghwa Nuri Park near the Korean Demilitarized Zone (DMZ).jpg',
      'Kyoto, Japan.jpg',
      'Lanzarote, Island in Spain (2).jpg',
      'Lanzarote, Island in Spain.jpg',
      'London, England.jpg',
      'New Forest, England (2).jpg',
      'New Forest, England.jpg',
      'New Jersey, USA.jpg',
      'New York City, USA (2).jpg',
      'New York City, USA (3).jpg',
      'New York City, USA (4).jpg',
      'New York City, USA (5).jpg',
      'New York City, USA (6).jpg',
      'New York City, USA.jpg',
      'Osaka, Japan.jpg',
      'Otemae Street in Himeji, Japan.jpg',
      'Roosevelt Island in New York City, USA (2).jpg',
      'Roosevelt Island in New York City, USA.jpg',
      'Seoul World Cup Stadium in South Korea.jpg',
      'Takeda Castle Ruins, Japan.jpg',
      'teamLab Planets in Tokyo, Japan.jpg',
      'Tiranë, Albania (2).jpg',
      'Tiranë, Albania (3).jpg',
      'Tiranë, Albania (4).jpg',
      'Tiranë, Albania.jpg',
      'Tokyo Skytree, Japan.jpg',
      "Tokyo's Akihabara district, Japan.jpg",
      'Tokyo, Japan.jpg',
      'Fushimi Inari Taisha in Kyoto, Japan.jpg',
      'Vlorë , Albania.jpg',
      'Vlorë Albania (2).jpg',
      'Vlorë, Albania (2).jpg',
      'Vlorë, Albania.jpg',
      'Yamanashi , Japan.jpg'
    ];

    function shuffle(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function displayName(f) {
      return f.replace(/\.[^.]+$/, '').replace(/\s*\(\d+\)$/, '').replace(/ in /g, ', ').replace(/ near the Korean Demilitarized Zone \(DMZ\)/g, '').trim();
    }

    const picked = shuffle([...allImages]).slice(0, 12);
    let pool = shuffle(allImages.filter(img => !picked.includes(img)));

    function nextImage() {
      if (!pool.length) pool = shuffle([...allImages]);
      return pool.pop();
    }

    const cells = Array.from(document.querySelectorAll('.gallery .cell'));
    const spinning = new Set();
    let waveActive = false;

    cells.forEach((cell, i) => {
      cell.querySelector('.face.front img').src = 'Personal_Images/' + picked[i];
      cell.dataset.name = displayName(picked[i]);
      cell.dataset.flipped = '0';
    });

    function updateDepth() {
      const cx = window.innerWidth  / 2;
      const cy = window.innerHeight / 2;
      cells.forEach(cell => {
        const h = cell.offsetHeight;
        const hh = h / 6;
        const p = h * 3;
        cell.style.setProperty('--hh', hh + 'px');
        cell.style.setProperty('--perspective', p + 'px');
        // offset perspective-origin so all cells share the same vanishing point (screen centre)
        const rect = cell.getBoundingClientRect();
        cell.style.perspectiveOrigin = `${cx - rect.left}px ${cy - rect.top}px`;
        // edge panels at cell edge (h/2), depth-scaled to span ±hh
        cell.style.setProperty('--hh-edge', (h / 2) + 'px');
        cell.style.setProperty('--depth-scale', (2 * hh / h).toFixed(6));
      });
    }
    window.addEventListener('resize', updateDepth);
    updateDepth();

    function spinCell() {
      if (waveActive) return;
      const available = cells.filter(c => !spinning.has(c));
      if (!available.length) return;
      const cell = available[Math.floor(Math.random() * available.length)];
      const flipper = cell.querySelector('.flipper');
      const isFlipped = cell.dataset.flipped === '1';
      const img = nextImage();

      spinning.add(cell);
      cell.classList.add('is-spinning');

      if (!isFlipped) {
        cell.querySelector('.face.back img').src = 'Personal_Images/' + img;
        requestAnimationFrame(() => flipper.classList.add('flipped'));
        cell.dataset.flipped = '1';
      } else {
        cell.querySelector('.face.front img').src = 'Personal_Images/' + img;
        requestAnimationFrame(() => flipper.classList.remove('flipped'));
        cell.dataset.flipped = '0';
      }

      cell.dataset.name = displayName(img);
      setTimeout(() => {
        spinning.delete(cell);
        cell.classList.remove('is-spinning');
      }, 2300);
    }

    let autoSpin = setInterval(spinCell, 5000);

    const WAVE_STEP = 100;   // ms delay between each cell in the wave
    const FLIP_DUR  = 2300;  // must match CSS transition + buffer
    const HOLD_DUR  = 5000;  // how long the mosaic is held before flipping back

    function triggerWave(clickedCell) {
      if (waveActive) return;
      waveActive = true;
      clearInterval(autoSpin);

      // Capture the image currently visible in the clicked cell
      const isFlipped = clickedCell.dataset.flipped === '1';
      const srcImg = clickedCell.querySelector(isFlipped ? '.face.back img' : '.face.front img');
      const imageSrc = srcImg.src;

      const gallery = document.querySelector('.gallery');
      const gr = gallery.getBoundingClientRect();

      // Snapshot positions and flip-state before any animation begins
      const snap = cells.map(cell => ({
        cell,
        rect: cell.getBoundingClientRect(),
        preFlipped: cell.dataset.flipped
      }));

      // --- Phase 1: wave forward ---
      snap.forEach(({ cell, rect, preFlipped }, i) => {
        const hiddenSel = preFlipped === '1' ? '.face.front' : '.face.back';
        const face = cell.querySelector(hiddenSel);

        // Paint the correct slice of the clicked image onto the hidden face
        face.style.backgroundImage    = `url('${imageSrc}')`;
        face.style.backgroundSize     = `${gr.width}px ${gr.height}px`;
        face.style.backgroundPosition = `-${rect.left - gr.left}px -${rect.top - gr.top}px`;
        const fi = face.querySelector('img');
        if (fi) fi.style.opacity = '0';

        setTimeout(() => {
          cell.classList.add('is-spinning');
          const flipper = cell.querySelector('.flipper');
          if (preFlipped === '0') { flipper.classList.add('flipped');    cell.dataset.flipped = '1'; }
          else                    { flipper.classList.remove('flipped'); cell.dataset.flipped = '0'; }
          setTimeout(() => cell.classList.remove('is-spinning'), FLIP_DUR);
        }, i * WAVE_STEP);
      });

      // --- Phase 2: wave back after last cell has finished + hold ---
      const flipBackAt = (snap.length - 1) * WAVE_STEP + FLIP_DUR + HOLD_DUR;
      setTimeout(() => {
        snap.forEach(({ cell, preFlipped }, i) => {
          setTimeout(() => {
            cell.classList.add('is-spinning');
            const flipper = cell.querySelector('.flipper');
            if (preFlipped === '0') { flipper.classList.remove('flipped'); cell.dataset.flipped = '0'; }
            else                    { flipper.classList.add('flipped');    cell.dataset.flipped = '1'; }
            setTimeout(() => cell.classList.remove('is-spinning'), FLIP_DUR);
          }, i * WAVE_STEP);
        });

        // Clean up and resume auto-spin once the flip-back wave finishes
        setTimeout(() => {
          cells.forEach(cell => {
            ['front', 'back'].forEach(side => {
              const face = cell.querySelector(`.face.${side}`);
              face.style.backgroundImage = face.style.backgroundSize = face.style.backgroundPosition = '';
              const fi = face.querySelector('img');
              if (fi) fi.style.opacity = '';
            });
          });
          waveActive = false;
          autoSpin = setInterval(spinCell, 5000);
        }, (snap.length - 1) * WAVE_STEP + FLIP_DUR + 100);

      }, flipBackAt);
    }

    cells.forEach(cell => cell.addEventListener('click', () => triggerWave(cell)));

    const canvas = document.getElementById('grain');
    const ctx = canvas.getContext('2d');

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }

    let last = 0;
    function draw(t) {
      requestAnimationFrame(draw);
      if (t - last < 50) return;
      last = t;

      const w = canvas.width, h = canvas.height;
      const img = ctx.createImageData(w, h);
      const buf = new Uint32Array(img.data.buffer);
      for (let i = 0; i < buf.length; i++) {
        const v = Math.random() * 255 | 0;
        buf[i] = (30 << 24) | (v << 16) | (v << 8) | v;
      }
      ctx.putImageData(img, 0, 0);
    }

    window.addEventListener('resize', resize);
    resize();
    requestAnimationFrame(draw);
  </script>
</body>
</html>
